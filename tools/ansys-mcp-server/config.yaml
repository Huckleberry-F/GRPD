# ==============================================================================
# ANSYS MCP Server 配置文件
# ==============================================================================

# ANSYS MAPDL 可执行文件的完整路径
# 请根据你的本地安装版本修改此路径
# 常见路径格式: C:\Program Files\ANSYS Inc\v251\ANSYS\bin\winx64\ansys251.exe
ansys_executable: "D:\\Software\\ANSYS\\ANSYS Inc\\v251\\ANSYS\\bin\\winx64\\ansys251.exe"

# ANSYS 项目根目录 (包含 .mac 文件和结果的工作空间)
ansys_project_root: "D:\\ANSYS_Project"

# 默认求解器设置
defaults:
  # 求解器使用的 CPU 核心数
  num_processors: 4
  # 求解器使用的内存 (MB)
  memory_mb: 2048
  # 任务超时时间 (秒)
  timeout_seconds: 3600
  # 是否在求解完成后自动清理临时文件
  auto_cleanup: false

# 允许的工作目录 (安全白名单，防止意外操作到系统目录)
allowed_directories:
  - "D:\\ANSYS_Project"
  - "D:\\C++pro\\GRPD\\Examples"
  - "D:\\C++pro\\GRPD\\build"
