#==============================================================================
# GRPD 全局主配置文件 (支持多模型装配体)
# ==============================================================================

# 1. 全局输出设置
Assembly:
  OutputGrpd: "../../Output/thermal_model.grpd" # Python 生成的网格保存路径
  
  # 2. 多模型几何定义 (可无限添加)
Parts:
  - PartID: 1                   # 模型 1 编号
    MatID: 1                    # 指定使用材质编号 1
    Dimension: 2
    Length: 0.5                 # 长度 0.5m
    Width: 0.1
    Thickness: 0.01
    dx: 0.01
    Offset: [0.0, 0.0, 0.0]     # 模型 1 的起点坐标 (留在原点)

  - PartID: 2                   # 模型 2 编号 (比如拼接在模型1右边)
    MatID: 2                    # 指定使用材质编号 1
    Dimension: 3
    Length: 0.5                # 长度 0.5m
    Width: 0.5
    Thickness: 0.5
    dx: 0.01
    Offset: [0.5, 0.0, 0.0]     # 模型 2 在 X 方向平移 0.5m，避免重叠

    # 3. 边界条件配置 (使用全局坐标系框选)
BoundaryConditions:
  - BcID: 1
    Name: "Model1_Left_Fixed_Temp"
    Box: [-999.0, 0.011, -999.0, 999.0, -999.0, 999.0] 
    Type: "T" 
    Value: 500.0        

  - BcID: 2
    Name: "Model2_Right_Heat_Flux"
    Box: [0.989, 999.0, -999.0, 999.0, -999.0, 999.0] 
    Type: "FLUX"   
    Value: 2000.0
    
  - BcID: 3
    Name: "Model2_Light_Heat_Conv"
    Box: [-999.0, 0.501, -999.0, 999.0, -999.0, 999.0] 
    Type: "CONV"   
    Value: [25.0 ,0]
 
# 4. 材质物理属性 (支持多个材质列表)
Materials:
  - MatID: 1                         # 材质标号
    Name: "Mat_1"                    # 材质名称
    Type: "ThermalMat"               # 对应的热传导本构模型
    Density: 7850.0                  # 密度 (kg/m^3)
    Conductivity: 45.0        # 导热系数 (W/(m·K))
    HeatCapacity: 460.0              # 比热容 (J/(kg·K))

  - MatID: 2                         # 材质标号
    Name: "Mat_2"                    # 材质名称
    Type: "ThermalMat"               # 对应的热传导本构模型
    Density: 8000.0                  # 密度 (kg/m^3)
    Conductivity: 45.0        # 导热系数 (W/(m·K))
    HeatCapacity: 460.0              # 比热容 (J/(kg·K))
    
# 5. 求解器控制 (纯供 C++ 读取)
Solver:
    Type: "ThermalExplicit"
    TotalTime: 10.0      # 总仿真时间 (s)
    TimeStep_dt: 1.0e-4  # 时间步长 (s)
    OMP_Threads: 8       # OpenMP 加速线程数
    
# 6. 输出设置
Writer:
    Name: "Result"
    Type: "binary"
    Variables:
      - Name: "PartID"
        Dimension: 1
      - Name: "Volume"
        Dimension: 1
      - Name: "Temperature"
        Dimension: 1
      - Name: "ID"
        Dimension: 1
      - Name: "HeatFlux"
        Dimension: 1