#==============================================================================
# GRPD 全局主配置文件 - 热传导 NOSB 测试用例
# 单位制：SI (m, kg, s, K, W)
# ==============================================================================

# 1. 全局输出设置
Assembly:
  OutputGrpd: "../../Output/thermal_model.grpd" # Python 生成的网格保存路径

  # 2. 多模型几何定义
Parts:
  - PartID: 1
    MatID: 1
    Dimension: 3
    Length: 1.0       # 1m
    Width: 1.0        # 1m
    Thickness: 1.0    # 1m
    dx: 0.05          # 粒子间距 0.05m → 20x20x20 = 8000 粒子
    Offset: [0.0, 0.0, 0.0]

    # 3. 边界条件配置
    # 测试场景：左端面固定 500K，其余面绝热，初始温度 0K
    # 预期结果：热量从左端面向右传播
BoundaryConditions:
  - BcID: 1
    Name: "Left_Fixed_Temp_500K"
    Box: [-999.0, 0.051, -999.0, 999.0, -999.0, 999.0]  # x < 0.051 → 左端第一层
    Type: "T"
    Value: 500.0

  - BcID: 2
    Name: "Right_Insulated"
    Box: [0.949, 999.0, -999.0, 999.0, -999.0, 999.0]   # 右端面 → 热流=0（绝热）
    Type: "FLUX"
    Value: 0.0

# 4. 材质物理属性 (钢，SI 单位)
Materials:
  - MatID: 1
    Name: "Steel_SI"
    Type: "FourierThermalMat"
    Density: 7850.0       # kg/m^3
    Conductivity: 45.0    # W/(m·K)
    HeatCapacity: 460.0   # J/(kg·K)

# 5. 求解器控制
# 显式时间步稳定性：dt_crit ≈ ρ*cp*dx² / (6k) ≈ 7850*460*0.0025 / 270 ≈ 33.4 s
# 取 dt = 1.0 远小于临界值，安全稳定
Solver:
  Engine: "PD"
  Type: "Thermal"
  TotalTime: 100.0        # 100秒，足够看到热传播
  TimeStep_dt: 1.0        # 时间步长 1秒（远小于 dt_crit ≈ 33s）
  OutputInterval: 10      # 每 10 步输出一次
  OMP_Threads: 8
  Horizon: 0.155          # 3.1 * dx = 3.1 * 0.05 = 0.155

# 6. 输出设置
Writer:
  Name: "Result"
  Type: "binary"
  Variables:
    - Name: "PartID"
      Dimension: 1
    - Name: "Volume"
      Dimension: 1
    - Name: "Temperature"
      Dimension: 1
    - Name: "ID"
      Dimension: 1
    - Name: "HeatFlux"
      Dimension: 1
    - Name: "NeighborCount"
      Dimension: 1
