#==============================================================================
# GRPD 全局主配置文件 - 热传导 NOSB 测试用例
# 单位制：N-mm-tonne-s-K
#   长度: mm
#   质量: tonne (1e3 kg)
#   时间: s
#   力:   N (= tonne·mm/s²)
#   能量: N·mm (= mJ)
#   温度: K
# ==============================================================================

# 1. 全局输出设置
Assembly:
  OutputGrpd: "../../Output/thermal_model.grpd"

  # 2. 多模型几何定义
Parts:
  - PartID: 1
    MatID: 1
    Dimension: 2
    Length: 100.0       # 100 mm
    Width: 100.0        # 100 mm
    Thickness: 1.0      # 1 层粒子 (= dx)，2D 平面问题
    dx: 1.0             # 粒子间距 5mm → 100x100x1 = 10000 粒子
    Offset: [0.0, 0.0, 0.0]

    # 3. 边界条件
    # 左端面固定 500K，右端面绝热
BoundaryConditions:
  - BcID: 1
    Name: "Left_Fixed_Temp_500K"
    Box: [-999.0, 1.1, -999.0, 999.0, -999.0, 999.0]  # x < 5.1mm → 左端第一层
    Type: "T"
    Value: 0.0

  - BcID: 2
    Name: "Right_Flux"
    Box: [98.9, 999.0, -999.0, 999.0, -999.0, 999.0]  # 右端面绝热
    Type: "FLUX"
    Value: 100.0

# 4. 材质物理属性 (钢，N-mm-tonne-s 单位)
#    SI → N-mm-tonne 换算:
#    密度:   7850 kg/m³  = 7.85e-9 tonne/mm³
#    导热:   45 W/(m·K)  = 45 tonne·mm/(s³·K)  (数值不变)
#    比热:   460 J/(kg·K)= 4.6e8 mm²/(s²·K)
Materials:
  - MatID: 1
    Name: "Steel_NmmTonne"
    Type: "FourierThermalMat"
    Density: 7.85e-9         # tonne/mm³
    Conductivity: 45.0       # tonne·mm/(s³·K)
    HeatCapacity: 4.6e8      # mm²/(s²·K)

# 5. 求解器控制
# dt_crit ≈ ρ·cp·dx² / (6k) = 7.85e-9 * 4.6e8 * 25 / 270 ≈ 0.334 s
# dt = 0.01 远小于 dt_crit，稳定
Solver:
  Engine: "PD"
  Type: "Thermal"
  TotalTime: 100.0            # 10 秒
  TimeStep_dt: 0.01          # dt = 0.01 s
  OutputInterval: 100        # 每 100 步输出一次（共 10 个输出帧）
  OMP_Threads: 8
  Horizon: 3.015              # 3.1 * dx = 3.1 * 1.0 = 3.1 mm

# 6. 输出设置
Writer:
  Name: "Result"
  Type: "binary"
  Variables:
    - Name: "PartID"
      Dimension: 1
    - Name: "Volume"
      Dimension: 1
    - Name: "Temperature"
      Dimension: 1
    - Name: "ID"
      Dimension: 1
    - Name: "HeatFlux"
      Dimension: 1
    - Name: "NeighborCount"
      Dimension: 1
