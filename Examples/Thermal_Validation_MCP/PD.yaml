Assembly: {}

Parts:
  - PartID: 1
    MatID: 1
    Dimension: 2
    Length: 5.0
    Width: 10.0
    Thickness: 1.0
    dx: 0.1

BoundaryConditions:
  - Step: 0
    BcID: 1
    Name: "Left_HeatFlux_100"
    Box: [-0.01, 0.10, -999.0, 999.0, -999.0, 999.0]
    Type: "FLUX"
    Value: 100.0

  - Step: 0
    BcID: 2
    Name: "Right_Fixed_Temp_100"
    Box: [4.9, 5.01, -999.0, 999.0, -999.0, 999.0]
    Type: "T"
    Value: 100.0

Materials:
  - MatID: 1
    Name: "Steel"
    Type: "FourierThermalMat"
    Density: 7.85e-9
    Conductivity: 45.0
    HeatCapacity: 4.6e8

Solver:
  Type: "Thermal"
  TimeIntegrator: "Explicit"
  Kernel: "NOSB_T"
  LoadSteps:
    - Step: 1
      Time: 1.0
      KBC: 0
      NumSubsteps: 10
    - Step: 2
      Time: 10.0
      KBC: 1
      NumSubsteps: 90
  TimeStep_dt: 0.0001
  OutputInterval: 10000
  OMP_Threads: 16
  Horizon: 0.3015
  KernelWeightType: "Linear"
  ZeroEnergyG0: 0.1
  ZeroEnergyMethod: "Zhang"

Writer:
  Name: "Result"
  Type: "binary"
  Variables:
    - Name: "PartID"
      Dimension: 1
    - Name: "Volume"
      Dimension: 1
    - Name: "Temperature"
      Dimension: 1
    - Name: "ID"
      Dimension: 1
    - Name: "HeatFlux"
      Dimension: 1
