#==============================================================================
# GRPD 全局主配置文件 - 力学 NOSB 测试用例 (2D 纯平面位移)
# 单位制：N-mm-tonne-s
#   长度: mm
#   质量: tonne (1e3 kg)
#   时间: s
#   力:   N (= tonne·mm/s²)
#   应力: MPa (= N/mm²)
# ==============================================================================

# 1. 全局设置
Assembly: {}

Parts:
  - PartID: 1
    MatID: 1
    Dimension: 3
    Thickness: 1.0
    Source: "380_acp_bullet.stl" # 已经在当前 Bullet 目录下，直接引用即可
    RepairMesh: false
    dx: 0.2 # 保持网格尺度一致
    Scale: 1.0

# 3. 边界条件
LoadStep_Conditions:
  - Step: 1
    BoundaryConditions:
      - BcID: 1
        Name: "Impact_P1"
        Box: [-999.0, 999.0, -999.0, 999.0, 22.0, 999.0]
        Type: "VELOCITY"
        Value: [1.0e20, 1.0e20, -100000.0] # 第一段：100 m/s 相对较慢
  - Step: 2
    BoundaryConditions:
      - BcID: 2
        Name: "Impact_P2"
        Box: [-999.0, 999.0, -999.0, 999.0, 22.0, 999.0]
        Type: "VELOCITY"
        Value: [1.0e20, 1.0e20, -300000.0] # 第二段：跃升至 300 m/s

# 4. 预置裂纹 (PreCracks) - 模拟空尖弹 (JHP) 弹头顶端的十字预制引导槽
# 弹体截面中心坐标约在 X=-37.2, Y=-41.1。我们仅在弹头处（Z=18.0 至 25.0）设置切割槽
PreCracks:
  - Type: "QuadCrack"
    # 十字引导槽 1：沿 X 轴劈穿弹尖
    V1: [-43.0, -41.1, 18.0]
    V2: [-31.0, -41.1, 18.0]
    V3: [-31.0, -41.1, 25.0]
    V4: [-43.0, -41.1, 25.0]
  - Type: "QuadCrack"
    # 十字引导槽 2：沿 Y 轴劈穿弹尖
    V1: [-37.2, -47.0, 18.0]
    V2: [-37.2, -35.0, 18.0]
    V3: [-37.2, -35.0, 25.0]
    V4: [-37.2, -47.0, 25.0]

# 5. 材质物理属性 (金属延性材料：J2 弹塑性 + 等效塑性应变断键模型)
Materials:
  - MatID: 1
    Name: "Steel_Plastic"
    Type: "J2PlasticityMat"
    Density: 8.0e-9 # tonne/mm³
    YoungsModulus: 1.91e5 # MPa (N/mm²)
    PoissonsRatio: 0.3 # 泊松比
    YieldStress: 800.0 # MPa 强力子弹钢屈服极限
    HardeningModulus: 1500.0 # MPa 塑性硬化模量
    HardeningType: "Isotropic"
    LargeDeformation: false
    # 断裂模型
    Fracture:
      Type: "EqPSFracture"
      Critical_EqPS: 0.05 # 核心实现：当双粒子的等效塑性应变达到 0.5 时，它们之间的键发生真正的物理断开

# 5. 求解器控制
Solver:
  Engine: "PD"
  Type: "Mechanical" # [关键] 切换为力学引擎
  Kernel: "NOSB_M"
  TimeIntegrator: "CentralDifference" # [关键] 使用中心差分法
  LoadSteps:
    - Step: 1
      Time: 4.35e-6
      TimeStep_dt: 8.7e-9
      KBC: 1 # KBC=1，代表恒速加载
    - Step: 2
      Time: 8.7e-6
      TimeStep_dt: 8.7e-9
      KBC: 1 # 跃升后的恒速加载
  OutputInterval: 50 # 每 50 步输出一帧
  OMP_Threads: 8
  Horizon: 0.603 # 邻域半径 3.015*dx
  KernelWeightType: "Linear"
  ZeroEnergyG0: 0.1 # 零能模式修正系数
  ZeroEnergyMethod: "Zhang" # [关键] 开启 Silling 修正

# 7. 输出设置
Writer:
  Name: "Disp_Result"
  Type: "binary"
  Variables:
    - Name: "PartID"
      Dimension: 1
    - Name: "Volume"
      Dimension: 1
    - Name: "Displacement"
      Dimension: 3
    - Name: "Velocity"
      Dimension: 3
    - Name: "DeformationGradient"
      Dimension: 9
    - Name: "PK1Stress"
      Dimension: 9
    - Name: "EqPlasticStrain_Old"
      Dimension: 1
    - Name: "BondIntegrity"
      Dimension: 1
