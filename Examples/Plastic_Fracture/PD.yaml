#==============================================================================
# GRPD 算例： 3D 圆柱形骨头/哑铃试样拉伸断裂 (Dogbone Tensile Test)
#
# 此算例通过读取外部 STL 模型建立一个存在中心微缩颈（诱导颈缩发生处）的圆柱，
# 使用 J2 塑性 + 断裂模型来观察三维空间的典型“杯锥状”（Cup and Cone）断口或颈缩现象。
#==============================================================================

# 1. 全局设置
Assembly: {}

# 2. 几何模型：读取 Python 脚本生成的 cylinder.stl
Parts:
  - PartID: 1
    MatID: 1
    Dimension: 2
    Source: "cylinder.stl"
    Thickness: 0.25 # 2D 虚拟厚度
    Offset: [0.0, 0.0, 0.0]
    dx: 0.25

# 3. 全局常驻边界（Step 0，永远生效）—— ANSYS APDL 单自由度风格
BoundaryConditions:
  - BcID: 1
    Name: "Grip_Bottom"
    Box: [-999.0, 999.0, -1.0, 3.0, -999.0, 999.0]
    Type: "DISP"
    Value: [0.0, 0.0, 0.0] # 夹具完全夹死（展开为 UX=0, UY=0, UZ=0 三条记录）

# 4. 多级分步载荷配置 —— 仅拉伸 Y 向，直接用 UY 标签
LoadStep_Conditions:
  - Step: 1
    BoundaryConditions:
      - BcID: 2
        Name: "Grip_Top_Step1"
        Box: [-999.0, 999.0, 97.0, 101.0, -999.0, 999.0]
        Type: "UY"
        Value: 2.0 # 第一阶段目标：Y 向拉伸至 2.0，X/Z 自由泊松收缩

  - Step: 2
    BoundaryConditions:
      - BcID: 3
        Name: "Grip_Top_Step2"
        Box: [-999.0, 999.0, 97.0, 101.0, -999.0, 999.0]
        Type: "UY"
        Value: 5.0 # 第二阶段目标：接续攀爬至 5.0

  - Step: 3
    BoundaryConditions:
      - BcID: 4
        Name: "Grip_Top_Step3"
        Box: [-999.0, 999.0, 97.0, 101.0, -999.0, 999.0]
        Type: "UY"
        Value: 6.0 # 第三阶段目标：接续攀爬至 6.0

# 5. 预置裂纹 (在试样中间 Y=50 处，沿 X 轴两侧切出一条对称的缺口平面)
PreCracks:
  - CrackID: 1
    Type: "QuadCrack"
    # 左侧缺口：X 从极远处切到 X = -6.0 位置，留下中间区域不切
    V1: [-99.0, 50.0, -99.0]
    V2: [-99.0, 50.0, 99.0]
    V3: [-6.0, 50.0, 99.0]
    V4: [-6.0, 50.0, -99.0]
  - CrackID: 2
    Type: "QuadCrack"
    # 右侧缺口：X 从 6.0 切到极远处位置，留下 X 在 [-6.0, 6.0] 的安全韧带
    V1: [6.0, 50.0, -99.0]
    V2: [6.0, 50.0, 99.0]
    V3: [99.0, 50.0, 99.0]
    V4: [99.0, 50.0, -99.0]

# 6. 材质物理属性
Materials:
  - MatID: 1
    Name: "Ductile_Steel_3D"
    Type: "JCPlasticityMat"
    Density: 8.0e-9 # tonne/mm³
    YoungsModulus: 2.0e5 # MPa
    PoissonsRatio: 0.3
    YieldStress: 350.0 # MPa 初屈服
    HardeningModulus: 1000.0 # MPa 塑性硬化
    HardeningType: "Isotropic"
    LargeDeformation: false
    JC_D1: 0.05 # 基础断裂塑性应变阈值
    JC_D2: 3.44 # 三轴度指数系数 (参考典型碳钢 JC 参数)
    JC_D3: -2.12 # 三轴度指数因子 (负值表示拉伸三轴度越高越易断裂)
    Fracture:
      Type: "DamageValueFracture"
      Critical_Damage: 0.99

# 7. 求解器与时间管理
Solver:
  Engine: "PD"
  Type: "Mechanical"
  Kernel: "NOSB_M"
  TimeIntegrator: "ADR"
  LoadSteps:
    - Step: 1
      Time: 2.0
      KBC: 0 # 第一段：显式指定斜坡平滑(Ramp)加载
      NumSubsteps: 5 # 第一段为了快速通过弹性阶段，使用极少的截断粗糙过
    - Step: 2
      Time: 5.0
      KBC: 0 # 第二段：继续维持斜坡平滑，探查塑性大变形
      NumSubsteps: 10 # 第二段为了精细捕捉塑性屈服大点和断裂跌落阶段，子步非常密集
    - Step: 3
      Time: 10.0
      KBC: 0 # 第二段：继续维持斜坡平滑，探查塑性大变形
      NumSubsteps: 10 # 第二段为了精细捕捉塑性屈服大点和断裂跌落阶段，子步非常密集

  MaxPseudoSteps: 15000
  MassScaleFactor: 1.0e10
  RampWaveRatio: 10.0
  DampingMethod: "HybridKinetic"
  Fracture_Strategy: "Staggered"
  DispTol: 1.0e-5
  ForceTol: 1.0e-3
  OutputInterval: 1000
  OMP_Threads: 16
  Horizon: 0.7545
  KernelWeightType: "Gaussian"
  ZeroEnergyG0: 0.2
  ZeroEnergyMethod: "Silling"

# 8. 输出设置
Writer:
  Name: "Dogbone_Fracture_Result"
  Type: "binary"
  Variables:
    - Name: "PartID"
      Dimension: 1
    - Name: "Volume"
      Dimension: 1
    - Name: "BondIntegrity"
      Dimension: 1
    - Name: "Displacement"
      Dimension: 3
    - Name: "PK1Stress"
      Dimension: 9
    - Name: "EqPlasticStrain_Old"
      Dimension: 1
    - Name: "VonMisesStress"
      Dimension: 1
    - Name: "Damage_Trial"
      Dimension: 1
    - Name: "ShapeTensorInv"
      Dimension: 9
