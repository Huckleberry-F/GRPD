#==============================================================================
# GRPD 算例： 3D 圆柱形骨头/哑铃试样拉伸断裂 (Dogbone Tensile Test)
#
# 此算例通过读取外部 STL 模型建立一个存在中心微缩颈（诱导颈缩发生处）的圆柱，
# 使用 J2 塑性 + 断裂模型来观察三维空间的典型“杯锥状”（Cup and Cone）断口或颈缩现象。
#==============================================================================

# 1. 全局设置
Assembly: {}

# 2. 几何模型：读取 Python 脚本生成的 cylinder.stl
Parts:
  - PartID: 1
    MatID: 1
    Dimension: 2
    Source: "cylinder.stl"
    Thickness: 0.25 # 2D 虚拟厚度
    Offset: [0.0, 0.0, 0.0]
    dx: 0.25

# 3. 全局常驻边界（Step 0，永远生效）
BoundaryConditions:
  - BcID: 1
    Name: "Grip_Bottom"
    Box: [-999.0, 999.0, -1.0, 3.0, -999.0, 999.0]
    Type: "DISP"
    Value: [0.0, 0.0, 0.0] # 模拟夹具完全夹死（X,Y,Z 都限制横向收缩）

# 4. 多级分步载荷配置（前处理几何阶段）
LoadStep_Conditions:
  - Step: 1
    BoundaryConditions:
      - BcID: 2
        Name: "Grip_Top_Step1"
        Box: [-999.0, 999.0, 97.0, 101.0, -999.0, 999.0]
        Type: "DISP"
        ApplyDir: [0, 1, 0] # 仅限定 Y 方向，允许横向受激产生泊松收缩
        Value: [0.0, 3.0, 0.0] # 第一阶段目标：极快拉伸至 0.5

  - Step: 2
    BoundaryConditions:
      - BcID: 3
        Name: "Grip_Top_Step2"
        Box: [-999.0, 999.0, 97.0, 101.0, -999.0, 999.0]
        Type: "DISP"
        ApplyDir: [0, 1, 0]
        Value: [0.0, 3.5, 0.0] # 第二阶段目标：接续极慢攀爬至 1.0

# 5. 预置裂纹 (在试样中间 Y=50 处，沿 X 轴两侧切出一条对称的缺口平面)
PreCracks:
  - CrackID: 1
    Type: "QuadCrack"
    # 左侧缺口：X 从极远处切到 X = -3.0 位置，留下中间区域不切
    V1: [-99.0, 50.0, -99.0]
    V2: [-99.0, 50.0, 99.0]
    V3: [-3.0, 50.0, 99.0]
    V4: [-3.0, 50.0, -99.0]
  - CrackID: 2
    Type: "QuadCrack"
    # 右侧缺口：X 从 3.0 切到极远处位置，留下 X 在 [-3.0, 3.0] 的安全韧带
    V1: [3.0, 50.0, -99.0]
    V2: [3.0, 50.0, 99.0]
    V3: [99.0, 50.0, 99.0]
    V4: [99.0, 50.0, -99.0]

# 6. 材质物理属性
Materials:
  - MatID: 1
    Name: "Ductile_Steel_3D"
    Type: "J2PlasticityMat"
    Density: 8.0e-9 # tonne/mm³
    YoungsModulus: 2.0e5 # MPa
    PoissonsRatio: 0.3
    YieldStress: 350.0 # MPa 初屈服
    HardeningModulus: 100.0 # MPa 塑性硬化
    HardeningType: "Isotropic"
    LargeDeformation: false
    Damage:
      Type: "EqPlasticStrain"
      Critical_EqPS: 0.1 # 极大地提升临界塑性，防止全场泛滥，只允许应力集中的缺口尖端撕裂

# 7. 求解器与时间管理
Solver:
  Engine: "PD"
  Type: "Mechanical"
  Kernel: "NOSB_M"
  TimeIntegrator: "ADR"
  LoadSteps:
    - Step: 1
      Time: 2.0
      KBC: 0 # 第一段：显式指定斜坡平滑(Ramp)加载
      NumSubsteps: 5 # 第一段为了快速通过弹性阶段，使用极少的截断粗糙过
    - Step: 2
      Time: 5.0
      KBC: 0 # 第二段：继续维持斜坡平滑，探查塑性大变形
      NumSubsteps: 100 # 第二段为了精细捕捉塑性屈服大点和断裂跌落阶段，子步非常密集

  MaxPseudoSteps: 15000
  MassScaleFactor: 1.0e8
  RampWaveRatio: 10.0
  DampingMethod: "HybridKinetic"
  DispTol: 1.0e-5
  ForceTol: 1.0e-3
  OutputInterval: 1000
  OMP_Threads: 16
  Horizon: 0.7545
  KernelWeightType: "Gaussian"
  ZeroEnergyG0: 0.2
  ZeroEnergyMethod: "Silling"

# 8. 输出设置
Writer:
  Name: "Dogbone_Fracture_Result"
  Type: "binary"
  Variables:
    - Name: "PartID"
      Dimension: 1
    - Name: "Volume"
      Dimension: 1
    - Name: "Damage"
      Dimension: 1
    - Name: "Displacement"
      Dimension: 3
    - Name: "PK1Stress"
      Dimension: 9
    - Name: "EqPlasticStrain_Old"
      Dimension: 1
    - Name: "VonMisesStress"
      Dimension: 1
    - Name: "ShapeTensorInv"
      Dimension: 9
