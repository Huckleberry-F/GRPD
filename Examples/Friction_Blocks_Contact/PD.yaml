#==============================================================================
# GRPD ADR Quasi-Static Contact Benchmark - 摩擦方块纯推力对标跑通验�?
#==============================================================================

# 1. 建模系统
System:
  Dimension: 2
  SavePath: "output"

Assembly: {}

Parts:
  - PartID: 1
    MatID: 1
    Dimension: 2
    Shape: "Box"
    Length: 20.0
    Width: 5.0
    dx: 0.25
    Offset: [-10.0, -5.0, 0.0]

  - PartID: 2
    MatID: 2
    Dimension: 2
    Shape: "Box"
    Length: 10.0
    Width: 5.0
    dx: 0.25
    Offset: [-5.0, 0.25, 0.0]

# 2. 材料赋予
Materials:
  - MatID: 1
    Name: "Base_Steel"
    Type: "LinearElasticMat"
    Density: 7.8e-9
    YoungsModulus: 2.1e5
    PoissonsRatio: 0.3

  - MatID: 2
    Name: "Top_Pusher"
    Type: "LinearElasticMat"
    Density: 7.8e-9
    YoungsModulus: 1.8e5
    PoissonsRatio: 0.25

PreCracks: []

# 3. 边界施加
BoundaryConditions:
  - Step: 0
    BcID: 1
    Name: "Fix_Base_Bottom"
    PartID: 1
    Box: [-11.0, 11.0, -5.1, -4.8, -1.0, 1.0]
    Type: "DISP"
    Value: [0.0, 0.0, 0.0]
  # 锁住滑块 X 方向，消除NTS光滑面上的刚体漂�?
  - Step: 0
    BcID: 2
    Name: "Fix_Slider_X"
    PartID: 2
    Box: [-6.0, 6.0, 4.8, 5.1, -1.0, 1.0]
    Type: "DISP"
    Value: [0.0, 0.0, 0.0]
    ApplyDir: [true, false, false]

  - Step: 1
    BcID: 3
    Name: "Push_Down_Pressure"
    PartID: 2
    Box: [-6.0, 6.0, 4.8, 5.1, -1.0, 1.0]
    Type: "PY"
    Value: -10000.0

# 4. 接触对设?
ContactPairs:
  - Name: "Blocks_Normal_Contact"
    Type: "General"
    Evaluator: "NTS"
    ForceLaw: "KinematicNormal"
    # PenaltyFactor: 1.0
    # DampingCoeff: 0.3
    # 【摩擦法则配置区】你可以随时在此切换刚刚新增的摩擦引擎！
    FrictionLaw: "TanhRegularized" # 选项: ExplicitImpulse / TanhRegularized / ElasticStickSlip
    FrictionCoeff: 0.0 # 启动摩擦?

    # TanhRegularized 专属参数
    # VRef: 1.0e-3 # 参考正则化速度，越小拐角越尖锐

    # ElasticStickSlip 专属参数 (如果你要切换到该法则，取消下方注�?
    # ShearStiffness: 1.0e6 # 静摩擦的微观弹簧刚度系数

    MasterPartID: 1
    SlavePartID: 2
    PinballRatio: 1.5
    SmoothRatio: 1.0
    RestitutionCoeff: 0.0
# 5. 求解积分器选择
Solver:
  Engine: "PD"
  Type: "Mechanical"
  Kernel: "NOSB_M"
  TimeIntegrator: "ADR"

  DynamicShapeTensor: false
  KernelWeightType: "Linear"
  ZeroEnergyG0: 1.0
  ZeroEnergyMethod: "Zhang"
  Horizon: 0.75375
  OMP_Threads: 16
  OutputInterval: 1000

  MaxPseudoSteps: 20000
  MassScaleFactor: 1.0e8
  DispTol: 1.0e-6
  ForceTol: 5.0e-3
  MinRefForce: 1.0e-2
  RampIters: 0
  RampWaveRatio: 5.0
  DampingMethod: "HybridKinetic"
  Fracture_Strategy: "Strict"

  LoadSteps:
    - Step: 1
      Time: 1.0
      KBC: 0
      NumSubsteps: 10

# 6. IO输出设置
Writer:
  Type: "binary"
  Variables:
    - Name: "PartID"
      Dimension: 1
    - Name: "Displacement"
      Dimension: 3
    - Name: "Velocity"
      Dimension: 3
    - Name: "Acceleration"
      Dimension: 3
    - Name: "ContactNormal"
      Dimension: 3
    - Name: "PK1Stress"
      Dimension: 9
    - Name: "ContactGap"
      Dimension: 1
    - Name: "VirtualSurfacePos"
      Dimension: 3
