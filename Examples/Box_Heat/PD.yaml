#==============================================================================
# GRPD 全局主配置文件 - 热传导 NOSB 测试用例
# 单位制：N-mm-tonne-s-K
#   长度: mm
#   质量: tonne (1e3 kg)
#   时间: s
#   力:   N (= tonne·mm/s²)
#   能量: N·mm (= mJ)
#   温度: K
# ==============================================================================

# 1. 全局设置
Assembly: {}

  # 2. 多模型几何定义
Parts:
  - PartID: 1
    MatID: 1
    Dimension: 2
    Source: "Low_Res_Box.stl"
    RepairMesh: false
    dx: 0.5          # 先用较大的 dx 快速测试
    Scale: 1.0     # Stanford Bunny 原始尺寸很小，需要放大

    # 3. 边界条件
    # 左端面固定 500K，右端面绝热
BoundaryConditions:
  - BcID: 1
    Name: "Left_Fixed_Temp_500K"
    Box: [-999.0, 999.0, -999.0, -25.5, -999.0, 999.0]  # z < 2.0mm → 左端第一层
    Type: "T"
    Value: 100.0

  - BcID: 2
    Name: "Right_Flux"
    Box: [-999.0, 999.0, 24.5, 999.0, -999.0, 999.0,]  # 上端面热流
    Type: "FLUX"
    Value: 100.0

# 4. 材质物理属性 (钢，N-mm-tonne-s 单位)
#    SI → N-mm-tonne 换算:
#    密度:   7850 kg/m³  = 7.85e-9 tonne/mm³
#    导热:   45 W/(m·K)  = 45 tonne·mm/(s³·K)  (数值不变)
#    比热:   460 J/(kg·K)= 4.6e8 mm²/(s²·K)
Materials:
  - MatID: 1
    Name: "Steel_NmmTonne"
    Type: "FourierThermalMat"
    Density: 7.85e-9         # tonne/mm³
    Conductivity: 45.0       # tonne·mm/(s³·K)
    HeatCapacity: 4.6e8      # mm²/(s²·K)

# 5. 求解器控制
# dt_crit ≈ ρ·cp·dx² / (6k) = 7.85e-9 * 4.6e8 * 25 / 270 ≈ 0.334 s
# dt = 0.01 远小于 dt_crit，稳定
Solver:
  Type: "Thermal"
  TimeIntegrator: "MatrixFreeImplicit"
  Algorithm: "JFNK"
  MaxNRIters: 15
  NRForceTol: 1.0e-5
  GMRES_MaxIters: 30
  Kernel: "NOSB_T"
  TotalTime: 5.0            # 5 秒
  TimeStep_dt: 0.5           # 隐式求解允许大步长 dt = 0.5 s (显式稳定上限为 0.33s)
  OutputInterval: 1         # 每步都输出
  OMP_Threads: 8
  Horizon: 1.605              
  KernelWeightType: "Linear" 
  ZeroEnergyG0: 0.1          
  ZeroEnergyMethod: "Zhang"   

# 6. 输出设置
Writer:
  Name: "Result"
  Type: "binary"
  Variables:
    - Name: "PartID"
      Dimension: 1
    - Name: "Volume"
      Dimension: 1
    - Name: "Temperature"
      Dimension: 1
    - Name: "ID"
      Dimension: 1
    - Name: "HeatFlux"
      Dimension: 1
    - Name: "NeighborCount"
      Dimension: 1

